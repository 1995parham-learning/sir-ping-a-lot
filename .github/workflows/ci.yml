name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Detect which service directories changed so we only build/test those.
  # Changing the workflow itself re-runs every service.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            user:
              - 'user/**'
              - '.github/workflows/ci.yml'
            server:
              - 'server/**'
              - '.github/workflows/ci.yml'
            checker:
              - 'checker/**'
              - '.github/workflows/ci.yml'
            saver:
              - 'saver/**'
              - '.github/workflows/ci.yml'

  build:
    name: ${{ matrix.service }}
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    defaults:
      run:
        working-directory: ${{ matrix.service }}

    # The tests are integration tests that talk to real infrastructure.
    # Each container is published on the exact port the default config expects
    # (Postgres 5431, Redis 6378, NATS 4221) so no config override is needed.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monitor
        ports:
          - 5431:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6378:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:latest
        ports:
          - 4221:4222

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          # Use each module's own Go version from its go.mod.
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: build
        run: go build -v ./...

      # Only the user service persists to Postgres in its tests; create its
      # tables via the GORM-based migrate command before running them.
      - name: migrate database
        if: matrix.service == 'user'
        run: go run . migrate

      - name: test
        run: go test -v ./... -covermode=atomic -coverprofile=coverage.out

      - name: upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  lint:
    name: lint ${{ matrix.service }}
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ${{ matrix.service }}
