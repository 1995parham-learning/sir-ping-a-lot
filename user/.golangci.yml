version: "2"
linters:
  default: all
  disable:
    # opinionated / low-signal on this codebase
    - varnamelen
    # requires an allow/deny list to mean anything; pure noise without config
    - depguard
    # too strict for these small models and request structs
    - exhaustruct
    # stylistic: inline `if err := f(); err != nil` is idiomatic here
    - noinlineerr
    - nonamedreturns
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
